<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased p-margin-mobile">
<!-- Login Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Brand Identity Header -->
<div class="flex flex-col items-center mb-10 space-y-4">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-primary flex items-center justify-center rounded-lg shadow-[0_0_15px_rgba(66,222,195,0.3)]">
<span class="material-symbols-outlined text-on-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">pill</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">PharmaStock Pro</h1>
</div>
<div class="flex items-center gap-2 bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant">
<div class="w-2 h-2 rounded-full bg-primary glow-dot"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Secure Pharmaceutical Platform</span>
</div>
</div>
<!-- Login Card -->
<section class="clinical-glass p-margin-desktop rounded-lg shadow-2xl">
<header class="mb-8">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">System Access</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Authenticated gateway for inventory management and clinical logistics.</p>
</header>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">mail</span>
<input class="input-clinical w-full h-12 pl-10 pr-4 rounded-lg font-mono-data text-mono-data" id="email" name="email" placeholder="operator@pharmastock.pro" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase" for="password">Security Token / Password</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">lock</span>
<input class="input-clinical w-full h-12 pl-10 pr-10 rounded-lg font-mono-data text-mono-data" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Forgot Link -->
<div class="flex justify-end">
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed-dim transition-colors uppercase" href="#">Forgot Access Credentials?</a>
</div>
<!-- Actions -->
<div class="pt-2">
<button class="w-full h-12 bg-primary text-on-primary font-label-caps text-label-caps rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2 uppercase tracking-widest" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">login</span>
</button>
</div>
</form>
<footer class="mt-10 pt-6 border-t border-outline-variant">
<div class="flex flex-col items-center space-y-3">
<p class="font-body-sm text-body-sm text-on-surface-variant text-center opacity-60">
                        © 2024 PharmaStock Pro v4.2.0. All logistics encrypted.
                    </p>
<div class="flex gap-4">

<div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none -z-10"></div>

<!-- Micro-interaction Scripts -->
<script>
        // Subtle hover effect on inputs to reinforce the 'Hardware LED' glow feel
        const inputs = document.querySelectorAll('.input-clinical');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Toggle password visibility (simulation)
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
